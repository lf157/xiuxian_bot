# 宗门纷争文案
# template_key: social/sect_conflict::<event_key>

# ---- resource_dispute: 资源争夺 (common, sect/field, realm 1-8) ----
resource_dispute:
  atmosphere:
    - |
      两拨弟子剑拔弩张地对峙在一处灵草地旁，
      谁先发现的、归谁所有，这种争论在宗门中最难分清。
    - |
      你带着采摘好的灵药正要离开，迎面遇上了另一门派的修士。
      对方盯着你储物袋的方向，意图明显。
    - |
      宗门大比在即，各方都在疯狂收集资源，明争暗斗在所难免。
  main_body:
    练气期: |
      对方是筑基期修士，在修为上压你一筹。
      但这片灵草地是你先发现的，{{ player_name }}不愿就此退步。
    筑基期: |
      {{ player_name }}冷静地评估了局势：对方三人，境界与你相当。
      正面硬来不明智，但完全退让也不是风格。
  choices:
    argue:
      action: "据理力争，这是你先发现的，谁也别想不讲理地拿走。"
      success: |
        你列举了充分的依据，对方理亏，最终各退一步，
        灵草地按发现先后分成两半，双方都能接受。
      failure: "对方不讲理，强行动手，你吃了亏。"
    intimidate:
      action: "以气势压制，让对方掂量掂量得罪你的代价。"
      success: "对方权衡利弊后选择退让，口中还在愤愤不平，却已离去。"
      failure: "对方被激怒了，本来还在观望，现在直接动手了。"
    compromise:
      action: "主动提出分配方案，各取所需，减少内耗。"
      success: |
        对方接受了你的提议，双方各得一部分，虽然不够满意，
        但总比两败俱伤要强。对方临走前对你点了点头，算是认可。
      failure: "你的退让被对方认为是软弱，对方得寸进尺，要求更多。"
    report:
      action: "记住对方的门派标记，事后向宗门长老反映。"
      success: "长老处置了此事，违规的一方受到了惩戒，你也获得了相应补偿。"
      failure: "长时间的程序性处理让你错过了最佳时机，灵草已经不新鲜了。"
  butterfly_echoes:
    宗门争端:
      - "那件事之后，和那个门派的关系就再也不复杂了——是敌对。"

# ---- inner_sect_politics: 内门纷争 (uncommon, sect, realm 3-10) ----
inner_sect_politics:
  atmosphere:
    - |
      宗门内部的暗流比外部的明争更难应对。
      一封信悄悄递到了你的手中，来自宗门内某位长老的私人信使。
    - |
      你发现自己被两派之间的争斗裹挟进去——
      不站队，两边都会将你视为敌人；站队，就意味着得罪另一边。
    - |
      宗门掌门之位悬而未决，内门中的角力已经白热化，
      连带着你这样的普通弟子，也被推上了选择的风口浪尖。
  main_body:
    通用: |
      修仙界的宗门政治并不比凡间简单，反而因为涉及更高的利益而更加凶险。
      {{ player_name }}手中有一张能影响局势的牌——如何打出这张牌，至关重要。
  choices:
    support_a:
      action: "支持其中一方，押注在这场争斗上。"
      success: |
        你支持的一方最终占据上风，你的押注获得了丰厚回报——
        包括资源倾斜和新的修炼机会，以及那位长老的青睐。
        📌 获得：【内门靠山】
      failure: |
        押注错了。你支持的一方落败，新掌权者对你的行为心有芥蒂，
        在宗门内的处境变得微妙。
    stay_neutral:
      action: "保持中立，谁也不得罪，但也谁都不帮。"
      success: "两派都没有为难你，这场纷争过后，你依然超然其外，得以安心修炼。"
      failure: "中立被两派都解读成了'对立'，两边都开始疏远你。"
    expose:
      action: "将这场纷争的真实内幕公开，让阳光照进暗处。"
      success: |
        透明化让双方都收敛了手段，争斗化明转暗，
        你虽然树敌，但也获得了讲规矩一方的尊重。
      failure: "两边都认为你是搅局者，联手给你制造了不少麻烦。"
  butterfly_echoes:
    内门靠山:
      - "那位长老在宗门中为你开了几次方便之门，这份情，得记着。"
    宗门争端:
      - "上次那件事的后续还没落定，宗门内的暗流还在涌动。"

# ---- inter_sect_challenge: 门派间切磋 (common, any, realm 2-8) ----
inter_sect_challenge:
  atmosphere:
    - |
      对方是来自邻近门派的修士，举止有礼，但眼神中有明显的好强之气。
      「听闻道友修为不俗，在下斗胆，敢请切磋一二？」
    - |
      宗门交流会上，对方指名道姓要和你切磋。
      台下数十道目光投来，退是退不了了。
  main_body:
    通用: |
      切磋不是生死搏杀，但输赢代表着门派的颜面，
      {{ player_name }}不可以大意。
  choices:
    accept:
      action: "接受挑战，出手不留情。"
      success: |
        一场精彩的切磋，你以绝对的实力和技巧压制了对手，
        赢得了干净漂亮。对方心服口服，抱拳行礼：「道友高明。」
        ✨ 声望提升
      failure: "输了。对方实力比外表展示出来的还要强，你败得有些难看。"
    accept_with_restraint:
      action: "接受切磋，但有意留了三分力，不展示全部实力。"
      success: "以有余力的姿态胜出，对方不知你深浅，日后更难针对你。"
      failure: "留力适得其反，输了不说，还让对方觉得你瞧不起他，双重打脸。"
    decline:
      action: "婉言谢绝，不参与这种表演性质的切磋。"
      success: "你有足够的理由拒绝，对方无法强求，场面各自收场。"
      failure: "拒绝被解读成了怯战，门派颜面受损，长老找你谈话了。"
  butterfly_echoes: {}
