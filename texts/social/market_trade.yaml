# 坊市交易文案
# template_key: social/market_trade::<event_key>

# ---- mystery_vendor: 神秘摊贩 (uncommon, market, realm 1-10) ----
mystery_vendor:
  atmosphere:
    - |
      你在城中闲逛时，注意到一个戴着斗笠的老人在街角摆了个小摊。
      摊上只有三样东西，每样都蒙着布。
      老人嘶哑地说：「选一个吧，小友。看你的缘法。」
    - |
      坊市的角落里，一个面容模糊的修士守着一只陈旧的木箱，
      箱子上没有标价，他只是静静地看着来来往往的人。
    - |
      摊位上的东西看起来普通，但你的神识扫过时，
      隐约感受到其中蕴含的某种难以言说的气息——有些不寻常。
  main_body:
    练气期: |
      以{{ player_name }}目前的眼力，难以判断这几件蒙面之物的真伪，
      只能凭直觉和缘分。
    筑基期: |
      {{ player_name }}尝试以灵识透视布面，
      但布面似乎经过特殊处理，神识无法穿透。
      老人摊开双手，笑而不语——这是考验缘法，不是考验眼力。
    金丹期: |
      以{{ player_name }}的眼力，能隐约感应到三件东西中灵力波动的强弱，
      但具体是什么，依然看不透。这老人的来历和手段，不简单。
  choices:
    choose_left:
      action: "你指向左边蒙着布的那件东西。"
      success: |
        揭开布，是一株百年灵草，品质上乘。
        老人点了点头：「有些缘法。」
        💎 获得：【百年灵草】
      failure: |
        揭开布，是一块普通的灵石，品相一般。
        老人叹了口气：「缘法一般，一般。」
    choose_middle:
      action: "你指向中间那件。"
      success: |
        布下是一卷古旧的残页，上面密密麻麻写满了字——是某门功法的片段！
        老人微微点头：「有些缘法。」
        📜 获得：【功法残页】
      failure: |
        布下是一只空玉瓶，连瓶塞都没有。老人耸耸肩：「缘分尽了。」
    choose_right:
      action: "你指向右边那件。"
      success: |
        一颗散发柔光的珠子！你感到鸿蒙珠在共鸣。
        老人猛然抬头看你，随即消失在人群中……
        📌 获得：【来历不明的珠子】（开启隐藏支线）
      failure: "布下是三粒低品灵石，老人笑笑，摆了摆手。"
    leave:
      action: "你不为所动，转身离去。"
      success: |
        身后传来老人的笑声：「不贪，好。」
        你感到心境更加通透。
        ✨ 心境 +3
      failure: ""
  butterfly_echoes:
    神秘摊贩相遇:
      - "你再次来到那个街角，老人不见了，只留下地上一个浅浅的椭圆形印记。"

# ---- auction_house: 拍卖行奇遇 (uncommon, market, realm 2-8) ----
auction_house:
  atmosphere:
    - |
      拍卖行今日热闹非凡，台上的拍品一件比一件珍贵，
      台下的气氛也越来越微妙——灵石的厚度，此刻决定了一切。
    - |
      拍卖师的声音响亮而专业，将台上那件东西描述得天花乱坠。
      你盯着它，心思快速转动——值这个价吗？
  main_body:
    通用: |
      竞拍是一门学问，出价太低抢不到，出价太高亏了本。
      {{ player_name }}打量着台上的拍品，同时也打量着其他竞拍者——
      有时候，让对手多出一些灵石，也是一种策略。
  choices:
    bid_high:
      action: "直接出一个让所有人沉默的高价，震慑竞争者。"
      success: "没人跟价，你成功拍下，代价是灵石消耗较多，但省去了拉锯的麻烦。"
      failure: "仍有一人跟价，对方似乎志在必得，双方拉锯之下，价格越抬越高。"
    bid_smart:
      action: "观察其他人的出价节奏，在最后关键时刻出价。"
      success: "掐准时机出价，其他人反应来不及，你以最优价格拿下了拍品。"
      failure: "判断失误，最后一刻另一人出了更高价，拍品易主。"
    pass:
      action: "这件东西并非你最需要的，按兵不动。"
      success: "把灵石留给更重要的东西。耐心是美德。"
      failure: ""
  butterfly_echoes: {}

# ---- wandering_merchant: 行脚商人 (common, road, realm 1-6) ----
wandering_merchant:
  atmosphere:
    - |
      一个背着巨大箱子的行商向你招手：「道友，看看有没有需要的？」
      他的箱子大得出奇，里面不知道装了多少东西。
    - |
      道旁坐着一个满脸风霜的老商人，见你走来，从怀里掏出一卷货单递给你：
      「走南闯北，见到什么买什么，不知道道友有没有看得上眼的。」
  main_body:
    通用: |
      行脚商人走遍天下，见识广博，有时候他们手里的东西，
      比固定坊市里的还要稀奇——当然，价格也未必便宜。
  choices:
    browse:
      action: "翻看货单，仔细挑选。"
      success: "货单上有几样你正需要的东西，价格合理，当场成交。"
      failure: "货单上的东西对你帮助不大，只是普通消耗品。"
    haggle:
      action: "压价，争取更优惠的价格。"
      success: "以你的口才和气势，成功将价格压低了三成。"
      failure: "商人不为所动，价格一分不让，你只能接受或放弃。"
    sell:
      action: "反过来，把你多余的东西卖给他。"
      success: "他识货，出的价格比坊市还高一些，你满意地收下灵石。"
      failure: "他摇摇头，这些东西他收不了，或给出的价格低得让你宁可留着。"
  butterfly_echoes: {}
