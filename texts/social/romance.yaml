# 道侣奇缘文案
# template_key: social/romance::<event_key>

# ---- first_encounter: 初遇 (uncommon, any, realm 2-8) ----
first_encounter:
  atmosphere:
    - |
      她站在山道转角处，背光而立，长发被风扬起。
      不知为何，你的脚步在那一刻停住了。
    - |
      大雨骤至，你和一个陌生人同时躲进了同一处岩洞。
      四目相对，双方都有些意外，随后各自移开视线。
    - |
      拍卖行散场，人流中你注意到了他——不是因为外貌，
      而是因为他在那件东西上停留的目光，和你一模一样。
  main_body:
    通用: |
      偶遇，修仙界中最难解释的缘分之一。
      两个陌路人，因各种各样的理由停在了同一处。
      {{ player_name }}看了一眼，心里有什么东西微微动了一下。
  choices:
    approach:
      action: "主动走上前，搭话。"
      success: |
        对话意外地顺畅，对方并未戒备，话语来来往往，
        天色暗下来都没有察觉。道别时，彼此都知道，这不会是最后一次相遇。
        📌 好感 +初始值，开启好感线
      failure: "对方礼貌但疏离，显然不愿与陌生人深谈，你的主动碰了壁。"
    wait_and_see:
      action: "不急，静静看着，等缘分自然流淌。"
      success: |
        是对方先开了口。也许你的存在触动了什么，
        对方打破了沉默，问了你一个问题——那个问题，让你愣了一下。
      failure: "机缘就这样擦肩而过，对方离去，你们再没有第二次偶遇。"
    ignore:
      action: "低头走自己的路，缘分这种事，强求不来。"
      success: "你走了，但那个背影在脑海里停留了很久。"
      failure: ""

# ---- mutual_help: 共渡危机 (uncommon, any, realm 3-10) ----
mutual_help:
  atmosphere:
    - |
      两个人同时身陷困境，互相不认识，却不得不背靠背。
      「你先走！」「你先走！」两人几乎同时说出了同一句话。
    - |
      她受了伤，你拦下了追击的妖兽。
      事后，她沉默地把随身携带的一颗丹药塞给你，然后转身离开。
    - |
      你遇到了麻烦，是一个陌生人出手解了围。
      「为什么帮我？」「修仙界，不该这么冷漠。」
  main_body:
    通用: |
      共渡危机是最快拉近距离的方式之一。
      背靠背的那一刻，{{ player_name }}感到了一种奇异的默契。
  choices:
    save_first:
      action: "以后的事以后说，先把眼前的危机渡过去再谈。"
      success: |
        危机化解，两人都松了一口气。对视的瞬间，
        有什么东西无声地改变了。
        📌 好感大涨
      failure: "危机没有顺利化解，两人都受了伤，处境更糟。"
    ask_why:
      action: "危机之中，忍不住问了一句：你为什么帮我？"
      success: |
        对方笑了一下，那个笑容令你愣了一下：「因为你值得被帮。」
        这句话莫名其妙地在脑海里留了很长时间。
      failure: "时机不对，「说话之际分了神，差点给妖兽可乘之机。"
    protect:
      action: "对方受伤了，你主动挡在她前面。"
      success: |
        你承受了本该落在她身上的攻击。
        那一刻对方怔住了，眼神里有什么东西不一样了。
      failure: "你的护盾不够强，两人都受了伤，但她的眼中有了不同的东西。"

# ---- growing_bond: 羁绊加深 (uncommon, any, realm 4+, 需要前置好感) ----
growing_bond:
  atmosphere:
    - |
      不知道从什么时候开始，有些话你只愿意对她说，
      有些事你会第一个想到告诉他。
    - |
      并肩而行，偶尔沉默，但那种沉默是舒适的，不是尴尬的。
    - |
      她说了一句话，很普通，但你却记了很久。
  main_body:
    通用: |
      羁绊不是一天建立的，它是无数个细节积累而成的东西。
      {{ player_name }}说不清楚是从哪一刻开始的，
      只知道这个人，已经不知不觉地成了生命里重要的一部分。
  choices:
    confide:
      action: "主动说起了一些不轻易对人说的事。"
      success: |
        对方认真地听完，没有评判，只是轻声说：「我明白。」
        这两个字，比任何安慰都更有分量。
        📌 羁绊深化，解锁新对话选项
      failure: "说出口之后有些后悔，对方的反应比预想的冷静，你感到一丝失落。"
    give_gift:
      action: "送了一件随手得来的小东西，不贵重，但有心意。"
      success: |
        对方接过，停顿了一下，然后轻轻笑了：「谢谢。」
        那个笑容，令你心跳快了半拍。
        📌 好感大涨
      failure: "对方礼貌地接受了，但你感觉那份礼物并未触动什么。"
  butterfly_echoes:
    道侣相遇:
      - "想起那个人，心里就暖了一下，说不清是什么感觉，但并不坏。"
    羁绊深化:
      - "有些话本来是脱口而出的，想到会被那个人听见，又咽了回去，改成了另一句。"
