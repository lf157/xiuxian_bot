# 伏击遭遇文案
# template_key: combat/ambush::<event_key>

# ---- roadside_ambush: 路途遇劫 (common, road/forest, realm 1-5) ----
roadside_ambush:
  atmosphere:
    - "树冠上有细微的响动，你刚想抬头——身后已传来破空声！"
    - "转过山道的瞬间，三道身影从两侧崖壁上飞跃而下，将去路截断。"
    - "枯叶无风自动，这是有人以阵法遮掩气息——埋伏！"
  main_body:
    练气期: |
      猝不及防之下，{{ player_name }}已被三名蒙面修士包围。
      对方有备而来，显然对你的路线了如指掌。
      最坏的消息是，其中一人的气息在你之上。
    筑基期: |
      {{ player_name }}在被包围的瞬间，神识已经快速扫过周围——
      七人，分布在三个方向，其中一人守着退路，是标准的剿杀阵型。
      但他们漏了一个方向：正上方。
    金丹期: |
      能设伏针对{{ player_name }}的，背景必然不简单。
      七名筑基境的修士，整齐划一的装束——这是某个势力的专业死士。
      能奈何你的不多，但这种麻烦本身就很令人头疼。
  choices:
    counter_ambush:
      action: |
        你假装中计，等对方收缩包围圈到最近距离时，猛然爆发。
        以己为圆心，全力释放灵力冲击波——在最密集处反击。
      success: |
        对方没料到你早已察觉，措手不及之下被冲散阵型。
        你趁乱拿下领头者，其余人见势不妙，四散逃窜。
        搜查领头者，找到了雇主的令牌——是谁要你的命？
      failure: "冲击波被一面护盾阵法硬吃，对方早有准备，你的反击落空。"
    break_through:
      action: "不管不顾，直接以最快速度冲向防守最薄弱的方向。"
      success: "速度压制一切，你强行突破，身后追兵渐渐掉队。"
      failure: "预备了机关！那个方向的地面骤然沉陷，你陷入了更深的困局。"
    talk:
      action: "停下，开口道：你们的雇主是谁？说出来，我可以考虑放过你们。"
      success: "你的气势压制住了对方，领头的犹豫了，吐出了一个名字。"
      failure: "对方不为所动，话音未落，攻势已至。"
  victory:
    - "伏击者悉数击败，你从领头者身上搜出了雇主的信物，若有所思地收入储物袋。"
    - "这些人不说话，但他们装束上的暗纹出卖了他们——你认出了那个势力的标记。"
  defeat:
    - "被打晕过去，醒来时人已经不见了，连储物袋也被翻过——但最重要的那件东西被藏得很深，没被找到。"
  butterfly_echoes:
    血影追踪:
      - "伏击的气息与上次如出一辙——同一批人？还是同一个幕后黑手？"

# ---- formation_trap: 阵法陷阱 (uncommon, ruins/cave, realm 2-7) ----
formation_trap:
  atmosphere:
    - "你脚下踩到了某个触发点，地面上倏然亮起了连环阵纹，来不及后退了。"
    - "进入这片废墟的瞬间，身后的入口骤然封闭——是自动触发的禁制阵。"
    - "四壁之上的阵纹同时亮起，红光刺目，大量凝实的攻击性灵力正在积蓄。"
  main_body:
    练气期: |
      困阵将{{ player_name }}困住，外界灵气被隔绝，体内灵力消耗会成倍加快。
      破阵需要找到核心阵眼，但在灵力被干扰的情况下，神识无法精确探查。
    筑基期: |
      {{ player_name }}运转灵识，快速分析阵纹走向——
      这是一座上古禁制阵，主人已不知去向，阵法依然在自动运转。
      阵眼在……西北角那块地砖下面。
    金丹期: |
      老阵了。{{ player_name }}只扫了一眼便看穿了阵法结构，
      但这种上古阵法即便破旧，其中蕴含的灵力依然庞大，强攻的代价不小。
  choices:
    break_array:
      action: "找到阵眼，集中全力将其摧毁，强行破阵。"
      success: |
        阵眼破碎，阵纹失去支撑，整座阵法以令人窒息的速度崩塌，
        释放出大量散逸的灵力，你贪婪地吸纳了一部分，颇有收获。
      failure: "阵法比想象中强韧，攻击引发了反弹，你被震飞出去，浑身酸软。"
    decipher:
      action: "不强攻，而是仔细研究阵纹走向，寻找关闭开关或漏洞。"
      success: |
        耗费了不少时间，但你找到了阵法的关闭序列。
        依次触发特定的阵纹节点，大阵缓缓停止运转，从容退出。
        这座阵法的结构被你记在了心中，日后或许用得上。
      failure: "误触了错误的序列，阵法变得更加激进，开始主动攻击。"
    wait:
      action: "阵法总有能源上限，静待其耗尽灵力自动解除。"
      success: "你盘膝修炼，以逸待劳。约一个时辰后，阵纹渐渐黯淡，阵门开启。"
      failure: "等了很久，阵法没有减弱的迹象——它有持续补充能源的机制。"
  victory:
    - "困阵已破，你从其核心区域找到了原主人遗留的储物袋，里面有些好东西。"
    - "阵法崩解，散逸的灵力如浪潮涌来，你尽数吸纳。"
  defeat:
    - "灵力耗尽，困阵依然完好，你在最后一刻以秘法强行硬撑着推开了阵门，跌倒在外。"

# ---- night_raid: 夜袭道侣 (rare, camp, realm 3-9) ----
night_raid:
  atmosphere:
    - "子夜刚过，护营结界突然颤抖——有人在强行破阵！"
    - "你从冥想中猛然惊醒，神识感应到七八股陌生气息正快速靠近。"
    - "营地被包围了，对方行动极为专业，几乎没有发出任何声音。"
  main_body:
    通用: |
      夜袭是修仙界中极为卑劣的手段——在敌人休息时偷袭，
      既是承认自己正面敌不过对方，也是彻底撕破了脸面。
      {{ player_name }}来不及多想，一边快速恢复战斗状态，一边评估敌情。
  choices:
    counter_attack:
      action: "立即反击，抢占先手。"
      success: "你比对方更快进入战斗状态，第一波反击让他们付出了沉重代价。"
      failure: "仓促应战，防御有破绽，对方的偷袭得手，形势被动。"
    defend_and_signal:
      action: "以防御为主，同时发出信号弹，呼叫援助。"
      success: "援军赶到，两面夹击，夜袭者被迫撤退。"
      failure: "信号弹被干扰，没有回应。只能独自应对。"
  victory:
    - "夜袭者被击退，你打扫战场，找到了他们遗留的物品，隐约能判断出背后势力。"
    - "俘获了一名受伤的袭击者，在你的询问下，他吐出了一个名字。"
  defeat:
    - "被人趁虚而入，损失惨重。你发誓从此不再轻易安营——这次教训代价太大了。"
