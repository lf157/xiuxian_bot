# 邪修对决文案
# template_key: combat/evil_cultivator::<event_key>

# ---- blood_shadow: 血影邪修 (rare, any, realm 3-8) ----
blood_shadow:
  atmosphere:
    - "空气中弥漫着一股浓郁的血腥气，那股气息令人恶心，却又隐隐带着某种令灵力躁动的力量。"
    - "他从阴影中走出，全身笼罩在血雾之内，面容看不清楚，只有两道冰冷的目光刺穿血雾盯着你。"
    - "道路被封死了。那人立于前方，黑袍随风飘动，袖袍之下不知藏着多少诡异法术。"
  main_body:
    练气期: |
      血影邪修的气息比{{ player_name }}高出不止一个境界。
      这种层次差距下，正面对抗无异于以卵击石。
      但他既然拦住了你，就说明他有所顾忌——你身上有他想要的东西。
    筑基期: |
      {{ player_name }}运转灵识，扫过对方身上的气息。
      血修——以鲜血为媒，炼化他人精气淬炼己身的邪修之法。
      这类人战力强横，但有个弱点：嗜血本能会影响判断。
    金丹期: |
      金丹修士的眼力让{{ player_name }}一眼看穿了对方根骨——
      血修，金丹后期，功法强横却根基不稳，是那种以损耗寿元换取战力的路子。
      能赢，但代价是多少，取决于这场战斗持续多久。
  choices:
    fight:
      action: |
        没有什么好说的。邪修横行，见一个便要除一个。
        {{ player_name }}抬手，法宝出鞘，战意勃发。
      success: |
        血雾弥漫中，你没有被那股血腥气干扰判断，精准攻击，连续突破血修的防御。
        他发出一声怒吼，血雾骤然浓缩成一根血枪刺来——你侧身，反手一击，终结了这场战斗。
        搜查他的储物袋，里面有一本残缺的功法、几枚奇怪的血丹，以及……一份名单。
      failure: |
        血修的战力远超预估。血雾中隐藏着无数细微的刀芒，
        你的防御被无声无息地撕裂，还没弄清楚伤势从何而来，已经负了重伤。
    negotiate:
      action: "你没有立刻出手，而是开口问他：拦住我，所为何事？"
      success: |
        出乎意料，对方开了口。他要的不是你的命——至少现在不是。
        他想要你身上某件东西的信息，以此换取放行。
        你从他的眼神中判断出，这是一次值得交换的机会。
      failure: "问话换来的是血枪——他没有谈判的兴趣。"
    flee:
      action: "此人来意不善，且境界在你之上。逃是最理智的选择。"
      success: "你施展极速遁法，对方追了一段，最终放弃，血影消散于夜色中。"
      failure: "血雾笼罩了整片区域，你跑不出去——这是他提前布置好的困阵。"
  victory:
    - "血修倒地，血雾逐渐消散，空气重新变得清新。你翻看他的遗物，若有所思。"
    - "这个人显然只是个爪牙，背后还有更大的势力——那份名单说明了一切。"
    - "战斗结束，你的心境没有波动。除恶扬善，本就是修行的一部分。"
  defeat:
    - "血修实力超出预期，你狼狈地撤离，身上的伤口在血雾中愈发刺痛。"
    - "败了。你压下羞耻感，默默记住了这个对手——日后必定奉还。"
  butterfly_echoes:
    血影追踪:
      - "那股熟悉的血腥气息再次飘来，你下意识握紧了法宝——是他，还是同伙？"
    陆氏线索:
      - "这个血修提到了一个名字，和之前那具枯骨残魂中的记忆似乎有所关联……"

# ---- poison_witch: 毒蛊女修 (uncommon, jungle/swamp, realm 2-6) ----
poison_witch:
  atmosphere:
    - "空气中有一种甜腻的香气，那香气令灵力运转不畅，是有人故意布置的毒雾。"
    - "一个戴着面纱的女修从树梢上跃下，手中握着一管细如牛毛的蛊针。"
    - "你感到皮肤上有轻微刺痛，低头一看，一根细针插入皮肤，已经来不及了。"
  main_body:
    练气期: |
      毒蛊之术极为阴毒，中毒之后灵力运转受阻，
      以{{ player_name }}现在的修为，解毒是最紧要的事，其次才是战斗。
    筑基期: |
      {{ player_name }}运转护体真气，将毒素阻隔在体外——
      筑基境的护体真气足以抵御普通毒药，但对方手中的蛊针显然非同寻常。
  choices:
    fight:
      action: "先发制人，不给她布置毒阵的机会。"
      success: "快攻压制，毒蛊女修擅长远程布毒，近战反而是弱点，你贴身而战，压制了她。"
      failure: "她退得极快，毒雾随之扩散，你不得不保持距离，反而中了她的节奏。"
    dispel:
      action: "先以解毒手段清除毒素，稳住阵脚再出手。"
      success: "服下随身携带的解毒丹，毒素消散，你感觉清醒了许多，随即反击。"
      failure: "解毒丹效果有限，这蛊毒显然是特殊配制的，需要更高级的解药。"
  victory:
    - "毒蛊女修败走，留下一只装满蛊虫的小木盒——你犹豫了一下，还是收起来，留待研究。"
    - "她临走前扔下一句话：你会后悔的。你不知道这句话是威胁，还是某种提示。"
  defeat:
    - "毒素深入经脉，你的战力急剧下降，只能先行撤退寻找解药。"

# ---- sect_hunter: 宗门猎杀队 (rare, any, realm 4-10) ----
sect_hunter:
  atmosphere:
    - "你被围住了。四面八方，七八道身影身着统一的青灰色劲装，手持法器，杀气凛然。"
    - "为首的人摘下斗笠，你认出了那个标志——是某个大宗门的追杀令执行者。"
    - "这些人是有备而来的，包围圈布置得严密无比，显然研究过你的战斗习惯。"
  main_body:
    练气期: |
      七八个筑基境的猎杀者，加上一个结丹境的领队。
      {{ player_name }}快速评估了一下逃跑路线——西侧的包围最薄弱。
    筑基期: |
      {{ player_name }}认识其中两人，他们曾是同门，如今却各为其主。
      这种感觉说不上滋味，但感伤留给之后，现在先想想怎么活下去。
    金丹期: |
      能出动这个阵容来针对{{ player_name }}，说明对方真的将自己视为威胁了。
      领队是元婴修士——麻烦了。
  choices:
    fight:
      action: "以一敌多，你没有选择单点突破，而是直接冲向领队。擒贼先擒王。"
      success: |
        领队没想到你会直接冲向他，错了一步，被你抢到近身。
        失去指挥的队伍阵型大乱，你趁机突破包围圈。
      failure: "领队并未慌乱，反而用自身作为诱饵，配合其余人的合围，你被前后夹击。"
    negotiate:
      action: "你停下脚步，高声问道：谁下的令？有什么误会可以当面说清楚。"
      success: "领队示意部下停手，愿意听你说完——至少给了你一个缓冲的机会。"
      failure: "没有谈判余地，对方的回答是一道攻击法术，直接打来。"
    flee:
      action: "以最快速度撕开一个口子，强行突围。"
      success: "猝不及防之下，你强行突破了包围，对方追了数里，终于被你甩脱。"
      failure: "包围圈外还有第二层——你逃进了更深的埋伏之中。"
  victory:
    - "击溃猎杀队后，你搜查了领队的令牌，上面记录了追杀令的来历——原来如此。"
    - "这些人奉命行事，你没有赶尽杀绝，只是沉声道：回去告诉你们的主子，这件事还没完。"
  defeat:
    - "寡不敌众，你被擒获，押解途中……"
    - "失去意识前，你看见其中一个猎杀者犹豫了一下，悄悄松开了绑绳一截。"
