# 妖兽遭遇战斗文案
# template_key: combat/beast_encounter::<event_key>

# ---- wolf_demon: 赤眸狼妖 (common, forest, realm 1-6) ----
wolf_demon:
  atmosphere:
    - "苍林寂静之中，枯叶的沙沙声猝然急促——那不是风。"
    - "一股腥气顺风飘来，灵兽的气息，且不止一头。"
    - "夜幕降临，林间的眼睛亮了起来，一双，两双，越来越多。"
  main_body:
    练气期: |
      一头赤眸巨狼从暗处蹿出，虎背熊腰，鬣毛如钢针竖立。
      它的气息比寻常妖兽浑厚三分——这是开了灵智的狼妖，而非普通野兽。
      以{{ player_name }}练气期的修为，正面硬刚风险不小。
    筑基期: |
      狼群将{{ player_name }}团团围住，领头的赤眸狼妖境界与你相当，
      但论战斗经验，在生死边缘磨砺出来的妖兽，往往比同境界修士更加凶悍。
    金丹期: |
      {{ player_name }}扫了一眼，这群狼妖不过筑基境，
      但领头那头独眼狼王眼中闪过的狡黠之色，令你不由得多加了一分戒心。
  choices:
    fight:
      action: |
        你握紧法宝，主动迎向狼群。这片山林你走过无数次，
        不能让这群东西嚣张到你的地盘上来。
      success: |
        战斗激烈而短促。赤眸狼妖东倒西歪，几头重伤遁走，
        领头的狼王对你嗥叫一声，最终还是夹尾而去。
        你收功，气息微乱，但心境平稳——这种程度的战斗，正是最好的磨砺。
      failure: |
        低估了狼妖的配合——它们有战术！一头正面吸引，
        两头从侧翼偷袭，你被抓出数道血痕，不得不且战且退。
    flee:
      action: |
        与其在不利地形硬拼，不如先退。{{ player_name }}转身施展遁法，
        借助林间地形甩开追击。
      success: "你借助地形优势拉开距离，狼嚎声渐渐远去，有惊无险。"
      failure: "狼妖速度超乎预料，追上来了！退路断绝，只能回身迎战。"
    intimidate:
      action: |
        {{ player_name }}猛然爆发出全身气势，修士的威压如实质般倾压而去，
        目的很简单：震慑。
      success: "领头的狼王犹豫了，最终带着狼群后退，不再靠近。"
      failure: "气势不够，威压反而激怒了狼妖，攻势更加猛烈。"
  victory:
    - "狼群溃散，林间重归寂静。你查看了一下战利品，收获还算不错。"
    - "最后一头狼妖拖着伤腿消失在林中，你深吸一口气，调整呼吸。"
    - "战斗结束，修为在搏命中又凝实了几分——这就是历练的意义。"
  defeat:
    - "狼妖的围攻超出了你的应对范围，你被迫撤退，身上多处受伤。"
    - "败了。你不甘心地看了一眼那头狼王，转身离去，留得青山在。"
  butterfly_echoes:
    初斗妖兽:
      - "遭遇狼妖，这已经不是第一次了。你对它们的战斗方式越来越熟悉。"
    斩蛇之人:
      - "狼妖似乎嗅到了你身上曾经战斗过的气息，领头的那头迟疑了一下。"

# ---- rock_serpent: 岩蟒 (uncommon, mountain, realm 2-7) ----
rock_serpent:
  atmosphere:
    - "山道上一块巨石纹丝不动，但你的神识感应到了呼吸——那不是石头。"
    - "碎石无声滚落，峭壁上，一双竖瞳的眼睛缓缓睁开。"
    - "地面微微震动，是那种细小而规律的震动，仿佛有什么庞大的东西在移动。"
  main_body:
    练气期: |
      岩蟒有三丈之长，鳞片坚如精铁，练气期的攻击恐怕难以造成有效伤害。
      {{ player_name }}盯着那双冰冷的竖瞳，迅速在心中评估——
      它的弱点在颈部鳞片稀薄处，但靠近的代价可能是被那条尾巴横扫出去。
    筑基期: |
      筑基境的灵识让{{ player_name }}看穿了岩蟒的弱处：
      下颌处有一片软鳞，那是天生的缺陷，也是唯一值得攻击的目标。
      问题是，如何在巨蟒的防御圈中抢到那个角度。
    金丹期: |
      以金丹期的战力平推足矣，{{ player_name }}没有多犹豫，
      但这头岩蟒境界不弱，且在山地中如鱼得水，不可掉以轻心。
  choices:
    fight:
      action: |
        你引动灵力，锁定岩蟒颈部的软鳞——就那里，一击制胜。
      success: |
        剑光精准刺入软鳞间隙，岩蟒发出一声凄厉的嘶鸣，
        尾巴横扫倒了半片树林，但已无力再战，最终盘踞不动。
        取出蟒胆，那是一味难得的炼丹材料。
      failure: |
        岩蟒陡然回头，动作比你预想的快得多。
        你被尾巴扫中，飞出去十余丈，背后的树木轰然折断。
    retreat:
      action: "你没有莽撞上前，而是悄悄绕道，避开岩蟒的地盘。"
      success: "岩蟒没有追来——它只守着自己的领地，不会主动追击。"
      failure: "岩蟒感知到了你的气息，竟然主动追了过来！"
  victory:
    - "岩蟒重伤钻入地下，留下一滩墨色的血迹和几片掉落的铁鳞。"
    - "取出岩蟒的蟒核，土系灵力极为纯粹，放入储物袋时仍能感受到沉甸甸的分量。"
  defeat:
    - "被岩蟒缠住，剧烈收缩的力道令你骨骼嘎嘎作响，不得不施展遁法强行脱身。"

# ---- thunder_hawk: 雷翎鹰 (uncommon, mountain/plain, realm 3-8) ----
thunder_hawk:
  atmosphere:
    - "乌云骤至，紫色雷光在云层中翻涌——不是天劫，是雷翎鹰在巡猎。"
    - "一声鹰唳破空而来，极高极远，但那道影子覆盖的阴影，已经落在你身上。"
    - "雷翎鹰展翅而来，每一次振翅都带起雷光闪烁，气势摄人。"
  main_body:
    练气期: |
      雷翎鹰翱翔高空，练气期修士几乎无法以攻击触及其要害——
      除非能逼它降低飞行高度，或引诱它俯冲。
      {{ player_name }}盯着那团雷光，快速思考应对方式。
    筑基期: |
      {{ player_name }}催动遁光升空，在高空与雷翎鹰交手。
      这是它的主场，风刃雷电交织，每一次对冲都要消耗大量灵力。
  choices:
    fight:
      action: "你引动灵力，以远程攻击为主，伺机寻找雷翎鹰的破绽。"
      success: |
        雷翎鹰的一翼被你击中，从高空俯冲的它失去平衡，
        你抓住机会，连续数击落在它身上，终于将其击落。
        雷翎羽毛是符箓的绝佳材料，你小心地收起几根。
      failure: "一道雷光正中你，麻痹感蔓延全身，半晌无法运转灵力。"
    lure:
      action: "故意露出破绽，引诱雷翎鹰俯冲，以逸待劳。"
      success: "等它俯冲到最低点的瞬间，你当头一击，势不可挡。"
      failure: "引诱失败，雷翎鹰比你想象的更谨慎，反而在高空持续骚扰。"
  victory:
    - "雷翎鹰倒地，雷光渐渐黯淡，你从羽翼间取下三根雷翎。"
    - "鹰眸中最后的战意熄灭，你对这只雄鹰点了点头，算是敬意。"
  defeat:
    - "雷光接连轰击，你狼狈逃窜，浑身焦黑，灵力几乎耗尽。"
