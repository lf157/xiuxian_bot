# 雷劫兽文案
# template_key: combat/tribulation_beast::<event_key>

# ---- thunder_dragon: 天雷蛟 (rare, tribulation zone, realm 5-12) ----
thunder_dragon:
  atmosphere:
    - "雷云骤聚，但这不是天劫——雷云中有一双眼睛，那是生命的眼睛。"
    - "天雷蛟从雷云中探出头来，全身覆盖着黑色鳞甲，每一片鳞甲都在不断放电。"
    - "它是天劫的化身，也是天地意志的执行者，见到突破瓶颈的修士便会主动出击。"
  main_body:
    金丹期: |
      天雷蛟是劫云所化，专门针对金丹期以上的修士。
      {{ player_name }}正处于突破关键期，此时出现天雷蛟，是试炼，也是危机。
      击败它，可额外获得渡劫感悟；若败于它，修为将大幅受损。
    元婴期: |
      以元婴境的修为应对天雷蛟，胜算在七成以上，
      但天雷蛟的特殊之处在于——它会随着战斗者实力的提升而同步增强。
      {{ player_name }}不能拖，越快结束越好。
  choices:
    fight_head_on:
      action: |
        天雷蛟是天道的考验，正面应对才是修士应有的态度。
        {{ player_name }}引动全身灵力，以最强的姿态迎向雷云。
      success: |
        雷光与灵力激烈碰撞，天雷蛟发出震天的怒吼，
        每一次冲击都让你的防御岌岌可危，但你没有退缩。
        最终一击，你以压倒性的意志力终结了这场天道考验。
        雷云消散，一道朦胧的道韵自天际流入你的经脉，渡劫感悟大涨。
      failure: |
        天雷蛟的力量超乎预估，在第七道雷击后，你的防御彻底崩溃。
        被轰飞出去，重伤倒地，修为受损，需要时间恢复。
    use_thunder_technique:
      action: "以雷制雷——你催动雷系功法，与天雷蛟同频共振。"
      success: |
        雷法在此刻获得了天地加持，与天雷蛟的力量相互融合，
        这种共振不断强化你的灵力，最终将天雷蛟反噬回去。
        奇妙的是，这场战斗结束后，你的雷系感悟突飞猛进。
      failure: "共振失败，反而让天雷蛟的攻击更加精准，你的抵抗被瓦解。"
    evade_and_outlast:
      action: "不硬抗，以极高速度闪避，消耗天雷蛟的能量。"
      success: "雷云的灵力终有上限，你以身法耗尽了它的能量蓄积，天雷蛟虚弱消散。"
      failure: "天雷蛟的追踪能力极强，你无法甩脱它，反而被它找到了你防御最薄弱的角度。"
  victory:
    - "天雷蛟消散于天地之间，留下一枚散发着紫金光芒的雷晶——天道馈赠，弥足珍贵。"
    - "这场战斗是天道给你的考验，你通过了。经脉中涌入的道韵令你整个人都清明了许多。"
    - "雷云散去，天空恢复晴朗，你站在原地，感受着突破后全新的自己。"
  defeat:
    - "败于天雷蛟，修为受损，境界跌落。你颓然坐在地上，心中五味杂陈，但没有放弃的念头。"

# ---- heart_demon_beast: 心魔化形 (epic, any, realm 4-20) ----
heart_demon_beast:
  atmosphere:
    - "它从你的心底爬出来，它的脸，是你最害怕见到的那张脸——你自己的脸。"
    - "空气中有一种无形的压迫感，不是外力，而是从内心深处升腾的恐惧。"
    - "心魔化形，是修行最凶险的劫难之一。眼前这个存在，它知道你所有的弱点。"
  main_body:
    通用: |
      心魔以{{ player_name }}自身作为模板化形，
      它知道你的每一个弱点，每一个恐惧，每一个你不敢正视的过去。
      这场战斗的胜负，从来不在于力量，而在于你能否直面自己。
  choices:
    face_it:
      action: |
        你停止了反击，深吸一口气，静静地看着那个镜中的自己。
        「我知道你是什么。你是我的恐惧，我的执念，我无法释怀的过去。」
      success: |
        心魔在你平静的注视下开始颤抖，它需要的是你的逃避和扭曲，
        而不是这份坦然。你一步步走向它，将它揽入怀中——
        「接受你，也是接受我自己。」
        心魔化光消散，一道磅礴的道心感悟涌入识海，心境大涨。
      failure: |
        你还是无法直视那些记忆，心魔借着你的动摇不断增强，
        最终将你的意识淹没于过去的噩梦之中。
    fight_back:
      action: "不承认，不接受，以最强的攻势将心魔彻底摧毁。"
      success: "以绝对的意志力强行碾压，心魔在力量压制下瓦解。但那些执念，依然还在。"
      failure: "越战越强——你的愤怒和执念正在不断滋养心魔，它比你更了解如何操纵你。"
    ignore:
      action: "闭目，不看，不想，将一切屏蔽在心神之外。"
      success: "虚空中心，不为所动。心魔找不到着力点，自然消散。"
      failure: "强压不等于消失，被你压下去的情绪在更深处积聚，迟早是个隐患。"
  victory:
    - "心魔消散，识海重归平静。这一战没有战利品，收获的是你自己的一部分。"
    - "战胜心魔之后，你坐了很久，回顾了很多事。有些结，今天终于解开了。"
  defeat:
    - "心魔占领了你的意识，你在噩梦中挣扎，直到某个外力将你惊醒，才得以逃脱。但代价是心境大损。"
