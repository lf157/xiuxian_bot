# 功能按钮首次点击剧情（仅首次显示）
# 目标：比默认提示更长，并引入关键人物

feature_intro:
  cultivate: |
    夜色沉下去时，你在城墙根下再次想起沈无极递给你的那张残页。
    「引气入体法」的字迹歪歪扭扭，却像一把钥匙，能打开你体内沉睡的门。
    远处的张老仍在广场上训斥后辈，苍澜城的喧闹并未停歇。
    但此刻，你只听见自己的呼吸：一吸一呼，灵气如丝，缓慢却真实地汇入经脉。
    你终于明白，修行并不是天才的专属，而是无数次不放弃的叠加。
    沈无极说过：“慢一点没关系，先走在路上。”
    这一刻，便是你真正踏上仙途的起点。

  shop_all: |
    坊市灯火如昼，万宝楼的匾额在夜风里轻轻作响。
    你刚踏入门槛，掌柜王成就抬眼笑道：“道友，又来挑机缘了？”
    货架上丹药、矿石、符箓并列而陈，表面平静，底下却是灵石与情报的暗流。
    药灵儿曾提醒你：有些看似普通的材料，会在关键时刻救命。
    陈丹师也说过：会买，和会炼一样重要。
    在这里，你买到的不止是物品，更是下一段命运的筹码。
    每一次交易，都可能把你推向更远的地方。

  sect_menu: |
    苍澜城的散修很多，但真正能走远的人，大多会在某一天踏入宗门。
    韩苍曾拍着你的肩说：“一个人能赢一场，兄弟能赢一世。”
    楚千殇则冷冷提醒你：没有规矩与传承，再锋利的剑也会钝。
    王逆那句“强者才有资格谈道”，至今仍在你耳边回响。
    宗门意味着资源、靠山、责任，也意味着你将站进更大的风暴中心。
    你要做的，不只是加入某一方，而是选择你准备背负的道路。
    从这一页开始，你的名字会逐渐被更多人记住。

  world_map: |
    你抬头看向天幕，群星沉默，山河却在脚下徐徐展开。
    苍澜城只是起点，东郊灵林、北望灵山、天渊宗城都在前方等你踏足。
    柳清竹曾在海风里说过：“别急着抵达，先学会看清自己站在哪里。”
    而沈无极总是笑你：“地图不是给胆小鬼看的，是给想走远的人看的。”
    每一块区域都写着不同的风险与机缘，也藏着不同的人与因果。
    你现在看到的，不只是路径，而是未来可能分岔的命运。
    选一条路走下去，故事就会真正开始转动。
