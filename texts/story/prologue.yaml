# 序章剧情文案
# /xian_start 首次进入时强制播放
# 对话格式：名字：话  旁白直接写

prologue:
  title: "序章：鸿蒙初开"

  scenes:
    - id: scene_01_hongmeng
      type: narration
      text: |
        鸿蒙未分之时，天地混沌一片。

        三道本源意志在虚无中诞生——

        恒道，时间与因果之力，水滴石穿，万物循环。
        逆道，意志与破灭之力，逆天改命，涅槃重生。
        衍道，空间与造化之力，星辰演化，开辟宇宙。

        三道碰撞，炸开鸿蒙，万界由此而生。

        凡界、灵界、真界、仙界、神界……
        无数世界如同巨树的枝叶，从那一刻开始生长。

        而你的故事，从最卑微的一片叶子开始。

    - id: scene_02_canglan
      type: narration
      text: |
        苍澜洲，天元大陆东南一隅。

        这里灵气稀薄，宗门林立却多是小派，
        真正的大能从不屑于在此驻足。

        苍澜城，一座不起眼的边陲小城。
        城中修士鱼龙混杂，散修横行，
        却也因此成了无数修仙故事的起点。

        今天，是一年一度的「灵根测试」日。

    - id: scene_03_test_scene
      type: narration
      text: |
        城中广场上人头攒动。

        一位白发老者坐在高台之上，面前摆着一块闪闪发光的灵石。
        他是负责测试的散修——张老。

        数百名十六岁的少年排着长队，
        每个人的脸上都写满了期待与紧张。

        有灵根者，可加入修仙门派，从此踏上仙途。
        无灵根者，一辈子只能做个凡人。

    - id: scene_04_others_test
      type: dialogue
      lines:
        - speaker: 张老
          text: "都排好队！一个一个来，不要推搡！"
        - speaker: null
          text: 一个少年上前，将手按在灵石上。灵石亮起明亮的蓝光。
        - speaker: 张老
          text: "水属灵根，中等资质！可入落霞谷！"
        - speaker: null
          text: 人群中响起一片羡慕的声音。又一个少年上前，灵石泛起淡淡的红光。
        - speaker: 张老
          text: "火属灵根，下等资质。勉强够格，去试试万法宗吧。"
        - speaker: null
          text: 周围议论纷纷，有人欢喜有人愁。轮到你了。

    - id: scene_05_player_test
      type: dialogue
      lines:
        - speaker: null
          text: |
            你深吸一口气，走上前去。

            将手按在灵石上——

            ……

            灵石纹丝不动。
        - speaker: 张老
          text: "嗯？再试试。"
        - speaker: null
          text: 你咬牙运力，手心攥出了汗，灵石依然灰暗。
        - speaker: 张老
          text: "废灵根。下一个。"
        - speaker: null
          text: |
            人群中响起一阵哄笑。

            「废灵根也来凑热闹？」
            「回家种田去吧。」

            你站在原地，脸色发白，却没有动。
            因为你感觉到了一件事——

            不是灵石没有反应，
            而是怀中那颗灰暗的珠子……微微发烫了一下。

            就好像，是珠子把灵石的反应给「吃」掉了。

    - id: scene_06_after_test
      type: dialogue
      lines:
        - speaker: null
          text: |
            广场散去，你独自坐在城墙根下。

            这颗珠子是养大你的老乞丐留下的唯一遗物。
            他临终前说过一句话。
        - speaker: 老乞丐
          text: "小子……这珠子，比你想象的值钱得多。等你有了灵气，再试试。"
        - speaker: null
          text: |
            有了灵气……前提是你得有灵根。

            但刚才灵石上那一瞬间的异样，你没有看错。

            你握紧珠子，站起身来。

            没有灵根又怎样。
            这条路，你偏要走走看。

    - id: scene_07_old_scroll
      type: narration
      text: |
        回到破庙，你翻遍了老乞丐留下的所有遗物。

        一件破旧的包袱里，你找到了一卷泛黄的残页。
        上面的字迹已经模糊大半，但勉强能辨认出——

        「太清养气诀·残篇」

        这是一部功法。虽然残缺不全，
        但上面记载的呼吸吐纳之法，看起来并不复杂。

        你盘膝而坐，按照残页上的口诀，开始尝试。

    - id: scene_08_first_qi
      type: narration
      text: |
        「吸……呼……引天地灵气入体……」

        起初什么也没发生。

        但当你下意识握紧怀中的珠子时——

        一丝极细微的凉意从珠子中渗出，
        顺着手臂流入体内。

        那是灵气。

        虽然微弱得几乎感觉不到，
        但你确信——那是灵气！

        你不是废灵根。

        泪水模糊了视线，
        但嘴角的弧度，是笑的。

    - id: scene_09_system_unlock
      type: narration
      text: |
        从这一刻起，你的修仙之路正式开始。

        ═══════════════════════════════
        🎮 系统已解锁
        ═══════════════════════════════

        你获得了以下能力：
        • 🧘 修炼 — 引导灵气入体，积累修为
        • 🗺️ 探索 — 前往各地寻找机缘
        • ⚔️ 历练 — 与妖兽战斗，磨砺实力

        前方的路漫长而未知。
        但每一个传奇，都始于微不足道的第一步。

        💎 获得道具：【灰暗珠子】
        📜 获得功法：【太清养气诀·残篇】
        🔮 当前境界：凡人

        提示：输入 /xian_start 查看主菜单

  # 序章结束后的初始选择（引导玩家进入游戏循环）
  post_prologue_choices:
    - label: "🧘 开始第一次修炼"
      action: "cultivate"
    - label: "🗺️ 去城里转转"
      action: "explore_canglan_city"
    - label: "📜 研究功法残页"
      action: "view_skills"
