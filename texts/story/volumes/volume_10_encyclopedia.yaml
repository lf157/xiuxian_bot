# 卷十：世界观设定集
# 非剧情卷，包含三道体系、宗门设定、地图总览、NPC关系图等
# 供策划/开发参考

volume_10:
  title: "卷十：天元录（设定集）"
  type: setting_encyclopedia

  sections:

    # ──────── 修行体系 ────────

    cultivation_system:
      title: "修行体系"
      content: |
        【境界总览】
        凡人 → 练气（1-6层）→ 筑基（初/中/后/圆满）→ 金丹（初/中/后/圆满）
        → 元婴（初/中/后/圆满）→ 化神（初/中/后/圆满）→ 合体（初/中/后/圆满）
        → 渡劫（初/中/后/圆满）→ 大乘（初/中/后/圆满）→ 渡仙劫 → 仙

        【三道体系】
        恒道（正道）：天道恒常，以不变应万变。特点：根基厚实，后期发力。
        逆道（邪道）：逆天改命，以人力胜天意。特点：突破快速，但根基不稳。
        衍道（中立）：万物衍化，顺势而为。特点：灵活多变，擅长辅助。

        【特殊道路】
        鸿蒙道：三道融合。仅沈无极一人走通。需要鸿蒙珠辅助。
        太阴道：柳清竹独有。太阴灵根觉醒后的特殊修行路线。
        星辰道：星璇天生。以星辰之力为根基的上古修行体系。

    # ──────── 灵根体系 ────────

    spirit_root:
      title: "灵根体系"
      content: |
        【灵根等级】
        天灵根 > 上等灵根 > 中等灵根 > 下等灵根 > 废灵根

        【特殊灵根】
        太阴灵根（柳清竹）：极稀有，可与月华共鸣，被太清宗视为祭炼材料。
        混沌灵根/废灵根（沈无极）：表面废灵根，实为可容纳三道的特殊体质。

        【主角灵根】
        下等灵根。吸收灵气速度慢，但根基极其扎实。
        后期证明：灵根决定起点，不决定终点。

    # ──────── 宗门势力 ────────

    sects:
      title: "宗门势力"
      entries:
        tianyuan_sect:
          name: "天元宗"
          alignment: "正道"
          specialty: "综合型宗门，传承完整"
          leader: "宗主（化神后期）"
          notable: "主角所在宗门，陈长老为主角恩师"

        taiching_sect:
          name: "太清宗"
          alignment: "正道"
          specialty: "恒道传承，底蕴深厚"
          leader: "太清掌教（大乘期）"
          notable: "柳清竹叛逃处，太初曾潜伏于此"

        tianjian_sect:
          name: "天剑门"
          alignment: "正道"
          specialty: "剑道极致"
          leader: "剑主（大乘期）"
          notable: "楚千殇所属，万剑峰为标志性区域"

        danding_pavilion:
          name: "丹鼎阁"
          alignment: "中立"
          specialty: "丹道至尊"
          leader: "丹圣（化神圆满）"
          notable: "天下丹药三成出自此处"

        nixian_temple:
          name: "逆天殿"
          alignment: "邪道（后转中立）"
          specialty: "逆道修行，逆天改命"
          leader: "殿主（大乘期）"
          notable: "王逆为少主，天元盟约后转型为中立势力"

        xingchen_pavilion:
          name: "星辰阁"
          alignment: "中立"
          specialty: "星象占卜，天道感知"
          leader: "星璇（万年星辰意志）"
          notable: "隐世势力，极少参与世俗纷争"

        xuesha_sect:
          name: "血煞宗（已覆灭）"
          alignment: "邪道"
          specialty: "血道修行，以战养战"
          leader: "已阵亡"
          notable: "卷三被正道联盟剿灭"

    # ──────── 地图总览 ────────

    world_map:
      title: "天元大陆地图"
      regions:
        canglan_zhou:
          name: "苍澜洲"
          desc: "东南偏远之地，灵气稀薄但朴实温厚"
          sub_maps: ["苍澜城", "东郊灵林", "南市坊市", "北望灵山", "落星湖", "落霞谷", "苍澜矿脉", "迷雾沼泽"]
          story_role: "主角起源地，卷一/三/八重要场景"

        tianyuan_region:
          name: "天元地区"
          desc: "大陆中部核心区域，各大宗门云集"
          sub_maps: ["天元宗城", "万剑峰", "丹鼎阁", "悬空山"]
          story_role: "卷二/四主要场景"

        chaos_sea:
          name: "乱星海"
          desc: "东南方海域，散修天堂与坟场"
          sub_maps: ["无名小岛群", "海心珊瑚礁"]
          story_role: "柳清竹初遇地"

        star_fall_sea:
          name: "星陨之海"
          desc: "天元大陆最神秘区域，星辰碎片散布"
          sub_maps: ["星石群", "星璇居所"]
          story_role: "星璇相关剧情，元婴结晶产地"

        demon_forest:
          name: "魔域密林"
          desc: "西北禁地，阴气弥漫"
          sub_maps: ["凝魂香产地", "邪修据点"]
          story_role: "邪修暗线追踪地"

        tongtian_peak:
          name: "通天峰"
          desc: "天元大陆最高峰，合体石台所在"
          sub_maps: ["峰底", "半山", "峰顶石台"]
          story_role: "合体/渡劫/仙劫场景"

        chaos_forbidden:
          name: "混沌禁地"
          desc: "大陆最深处秘境，混沌之气弥漫"
          sub_maps: ["外围", "深层", "鸿蒙之源"]
          story_role: "沈无极三道融合场景"

        three_realm_rift:
          name: "三界裂隙"
          desc: "连接凡间与虚界的空间裂缝"
          sub_maps: ["裂隙入口", "裂隙内部", "封印之壁"]
          story_role: "卷五/六/七核心战场"

    # ──────── NPC关系网 ────────

    npc_relationships:
      title: "NPC关系网"
      content: |
        【核心关系】
        主角 ←至交好友→ 沈无极
        主角 ←兄弟情义→ 韩苍
        主角 ←道侣/恋人→ 柳清竹
        主角 ←亦敌亦友→ 楚千殇
        主角 ←对手变战友→ 王逆
        主角 ←命运指引→ 星璇
        主角 ←师恩→ 陈长老、林中老人、陈丹师

        【苍澜洲关系】
        石伯（凡人恩人）→ 药灵儿（采药伙伴）→ 张大（猎户兄长）→ 陈丹师（丹道恩师）

        【势力关系（初期）】
        正道联盟：太清宗 + 天剑门 + 天元宗 + 丹鼎阁
        邪道势力：逆天殿 + 血煞宗 + 万鬼门
        中立：星辰阁

        【势力关系（终局）】
        天元盟约：所有势力统一阵线
        血煞宗：已覆灭
        逆天殿：转型为中立

    # ──────── 重要法器/物品 ────────

    artifacts:
      title: "重要法器与物品"
      entries:
        hongmeng_pearl:
          name: "鸿蒙珠"
          owner: "沈无极"
          desc: "上古至宝，可融合三道之力。是沈无极从废灵根逆袭的关键。"

        wan_ling_tower:
          name: "万灵塔"
          owner: "太初（已毁）"
          desc: "禁忌法器，以灵魂为燃料可控制万人心智。被主角一剑摧毁。"

        taiyin_mirror:
          name: "太阴锁魂镜"
          owner: "太清宗"
          desc: "需太阴灵根祭炼的法器。柳清竹逃离太清宗的导火索。"

        dao_fragments:
          name: "天道碎片×9"
          owner: "联合持有"
          desc: "散落在上古遗迹中的天道法则结晶。用于永久封印三界裂隙。"

        spirit_egg:
          name: "金色灵蛋/小金"
          owner: "主角"
          desc: "上古金翅大鹏后裔。从灵蛋到神兽，一路陪伴主角。"

    # ──────── 主线时间轴 ────────

    timeline:
      title: "主线时间轴"
      events:
        - period: "第0年"
          event: "灵根测试。主角被判下等灵根，沈无极被判废灵根。两人结识。"
        - period: "第1-3年"
          event: "苍澜洲修炼期。探索六大区域，结识石伯/药灵儿/张大/陈丹师等。"
        - period: "第3年"
          event: "筑基成功。宗门招聘到来，与沈无极分别。"
        - period: "第3-15年"
          event: "天元宗修炼期。外门→内门，试剑大会。结识韩苍/楚千殇。"
        - period: "第15年"
          event: "乱星海遇柳清竹。发现血煞宗内鬼。"
        - period: "第20年"
          event: "星陨之海遇星璇。金丹圆满。"
        - period: "第25年"
          event: "返回苍澜洲，破坏血煞宗灵脉抽取阵法。元婴突破。"
        - period: "第30-50年"
          event: "正道联盟剿灭血煞宗。发现天命之子线索。"
        - period: "第50-100年"
          event: "化神突破。发现太初阴谋。混沌禁地之行。"
        - period: "第100-150年"
          event: "合体突破。万灵塔事件。太初被击退。"
        - period: "第150-200年"
          event: "三界裂隙出现。虚界战争爆发。"
        - period: "第200-250年"
          event: "渡劫突破。虚界之王之战。三界裂隙封印。沈无极离去。"
        - period: "第250-300年"
          event: "大乘突破。天道碎片之旅。永恒封印。"
        - period: "第300年+"
          event: "仙劫。飞升或留守。主线完结。"
