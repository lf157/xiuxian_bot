# 秘境文案
# template_key: adventure/secret_realm::<event_key>

# ---- star_meteor_realm: 星陨秘境 (rare, any, realm 3-8) ----
star_meteor_realm:
  atmosphere:
    - |
      一道耀眼的星光从天际坠落，砸入远处山谷，掀起冲天尘柱。
      那不是陨石——灵力波动太纯粹了，这是某处上古秘境的入口骤然开启。
    - |
      地面上出现了一个旋涡状的光门，内部星光流转，散发着令修士无法抗拒的机缘气息。
      光门周围已聚集了数名修士，各怀心思，皆在犹豫。
    - |
      你循着灵力波动的来源，在绝壁的裂缝中发现了一扇半掩的石门，
      门后透出的星光，来自十万里高空。
  main_body:
    练气期: |
      星陨秘境对修为有所要求，以{{ player_name }}目前的境界，
      勉强够到了最低门槛。进入后能否生存，完全取决于运气和应变能力。
    筑基期: |
      {{ player_name }}对秘境内的情况已有了解——星陨秘境中，
      天地法则异于外界，灵力压制约在三成，但同时星辰灵气极为充沛，
      对衍道修士尤为有利。
    金丹期: |
      以{{ player_name }}的修为进入星陨秘境，压制感不强，
      但秘境的真正危险不在妖兽，而在其中流动的星辰法则碎片——
      没有足够理解力的修士，触碰之后会被法则撕碎神魂。
  choices:
    enter_alone:
      action: "不等其他修士，独自第一个踏入秘境。先入者，往往能得到最好的机遇。"
      success: |
        抢先进入，你在最核心的区域发现了最珍贵的遗留。
        但也因此成了后续进入者的眼中钉——在秘境中，敌友关系极为复杂。
      failure: "秘境内的第一层关卡便让你吃了大亏，内部比外面预想的险峻多了。"
    form_team:
      action: "与其他修士达成临时同盟，共同探索，利益均分。"
      success: |
        临时同盟比预想中顺利，几人互补长短，深入到了秘境核心区域，
        收获颇丰，分手时各取所需，未起冲突。
      failure: "盟友在关键时刻背叛，趁你应对妖兽之际，抢走了发现的宝物。"
    observe_first:
      action: "先在门口观察其他进入者，收集情报，再决定是否入内。"
      success: |
        观察了一刻钟，摸清了秘境内部的大致格局，
        以及其他修士的实力分布，心中有了计划后再从容入内。
      failure: "等你下定决心进入时，秘境的开启时间已所剩不多，来不及深入探索。"
  victory:
    - "秘境关闭前，你收获满满地踏出光门，身后的星光缓缓熄灭。"
    - "从星陨秘境带出的星辰精华，是这次探索最大的收获，光是这一件，便值回全程的风险。"
  defeat:
    - "秘境内遭遇强敌，被迫提前撤出，收获寥寥，但好歹全身而退。"
  butterfly_echoes:
    星陨入场:
      - "上次在星陨秘境中得到的星辰碎片，在你手中微微震动——似乎在感应着什么。"

# ---- ancient_battlefield: 上古战场秘境 (epic, any, realm 6-15) ----
ancient_battlefield:
  atmosphere:
    - |
      空气突然凝滞，你感到一种来自岁月深处的沉重压力迎面而来。
      眼前显现出一片废墟——不，这不是普通废墟，那些断刀残剑中，
      还有尚未消散的战意在低吼。
    - |
      一道古老的印记在你脚下的地面上浮现，随后大地缓缓下沉，
      显露出一处封印已久的上古战场。
      空气中弥漫着数万年前的血气与道韵。
  main_body:
    元婴期: |
      这是一处上古大能曾经厮杀过的秘境，战场中残留着多位强者的道韵碎片，
      以{{ player_name }}的修为，能感应到其中的意志，但要完全吸收，还需时日。
    化神期: |
      {{ player_name }}踏入战场，顿时感受到铺天盖地的战意——
      这里每一寸土地都浸透了古之强者的鲜血与意志，
      化神境的修士才能真正从中汲取营养而不被压垮。
  choices:
    absorb_will:
      action: "盘膝坐于战场中央，尝试感应并吸收残留的道意碎片。"
      success: |
        古之强者的道意缓缓流入识海，那些来自上古的战斗意志，
        让你对力量有了全新的理解。修炼感悟大涨，且获得了一份古老的战技残影。
      failure: "道意太过强横，你无法消化，反而被冲击得神魂震荡，被迫退出。"
    search_relics:
      action: "在战场中寻找上古遗留的器物和功法。"
      success: "在一片焦土下方，挖出了一柄残破但仍蕴含强大灵力的上古法器。"
      failure: "战场中有守护意志，阻止任何人带走其中的遗留，你一无所获。"
  victory:
    - "离开上古战场时，你感到整个人都沉甸甸的——吸收的道意需要时间慢慢消化。"
  defeat:
    - "古之强者的意志太过强横，你被压制得无法动弹，只能狼狈退出。"
