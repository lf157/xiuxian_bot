# 天外陨石文案
# template_key: adventure/meteorite::<event_key>

# ---- falling_star: 流星坠落 (uncommon, any, realm 1-6) ----
falling_star:
  atmosphere:
    - |
      夜晚，一颗流星拖着长长的尾焰从天际划过——
      但它没有消失，而是坠落在城外的山林中！
      一阵强烈的灵力波动从坠落点传来……
    - |
      轰隆一声，天际一道耀眼的白光划破夜空，紧接着大地微微震颤。
      那是星辰坠落的声音，坠落点距你不过十余里。
    - |
      你发现了一个新形成的坑洼，坑底有一块拳头大小的石头，
      还在冒着热气，表面泛着奇异的星光。
  main_body:
    练气期: |
      以{{ player_name }}现在的见识，无法判断这块星石的价值，
      但它散发的灵力波动是真实的——这不是普通的陨石。
      问题是，附近的气息告诉你，不止你一个人察觉到了它的坠落。
    筑基期: |
      {{ player_name }}认出了这是星辰碎铁，炼器的绝佳材料，
      以此铸造的法器对星辰道法有天然的亲和性。
      但此物一旦坠落，附近的修士都会感应到，争抢在所难免。
    金丹期: |
      不是普通的星辰碎铁——{{ player_name }}神识扫过，
      这块陨石内部封存着一丝上古星力，极为稀有。
      要在其他修士赶来之前取走，时间不多了。
  choices:
    rush_in:
      action: "立刻前往查看，争取第一个抵达，抢得先机。"
      success: |
        你第一个赶到现场，发现了一个散发着星光的陨石坑。
        坑底的星辰碎铁还在冒着热气，你当机立断取走，随即离开。
        💎 获得：【星辰碎铁】
      failure: |
        还没靠近，一头浑身流光的异兽从坑中跃出！
        它是被星力吸引而来的，已经在守护这块陨石。
    observe_first:
      action: "先远远观察，看清局势再说。"
      success: |
        你在远处观察，看到好几拨修士争先恐后赶去。很快那里爆发了战斗……
        你从这场混战中渔翁得利，趁乱捡到了散落在外围的几粒星辰碎屑。
        💎 获得：【星辰碎屑 ×3】
      failure: "等你下定决心靠近时，陨石已被先到者取走，只剩一个焦黑的坑。"
    ignore:
      action: "与我无关，继续修炼。"
      success: |
        你心如止水，不为外物所动。这份定力让你的心境更加稳固。
        ✨ 心境 +5
      failure: |
        你继续修炼……但你不知道的是，那颗流星中藏着的东西，
        日后将与你产生奇妙的因果。
        📌 隐藏标记：「错过流星」
  butterfly_echoes:
    星陨入场:
      - "储物袋中的星辰碎铁微微震动，似乎在感应着什么——和那次流星坠落一样的气息。"
    错过流星:
      - "你无意中路过一处焦黑的坑洼，那气息……和那晚的流星有关吗？"

# ---- star_beast: 星力异兽 (rare, mountain/plain, realm 4-9) ----
star_beast:
  atmosphere:
    - |
      星力异兽是被天外星辰能量浸润而生的特殊妖兽，
      全身散发着幽蓝的星光，每一步都在地面留下发光的印记。
    - |
      这头星力异兽体型巨大，星光在它的鳞甲上流动，
      仿佛将整片夜空缩进了它的身体里。
  main_body:
    筑基期: |
      星力异兽的战力等同于同境界修士的一倍有余，
      {{ player_name }}与之交手，需保持高度警惕。
      但如果能击败它，其身上的星辰结晶是难得的修炼材料。
  choices:
    fight:
      action: "星力异兽挡路，不战不行。"
      success: |
        经过一番激烈的缠斗，星力异兽最终力竭，
        身上的星光逐渐黯淡，化作一枚拳头大小的星辰结晶落在地上。
        💎 获得：【星辰结晶】
      failure: "星力冲击让你的经脉暂时僵化，只能先行撤退。"
    lure_away:
      action: "以灵力制造干扰，将星力异兽引开，绕道而行。"
      success: "成功！星力异兽被引走，你趁机绕过它的领地。"
      failure: "干扰失败，星力异兽对你的气息更加敏感，反而追了过来。"
  victory:
    - "星力异兽倒地，星光消散成满地碎屑，你仔细收集每一粒星辰碎屑，一点也不浪费。"
  defeat:
    - "星力冲击让你的灵力运转失常，不得不先退，等待灵力恢复。"
