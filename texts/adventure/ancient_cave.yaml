# 古洞探索文案
# template_key: adventure/ancient_cave::<event_key>

# ---- bone_jade: 枯骨玉佩 (rare, desert, realm 1-6) ----
bone_jade:
  atmosphere:
    - |
      黄沙漫天的荒漠中，一阵阴风毫无征兆地刮过。
      沙丘之下，一只枯骨手臂从流沙中探出，
      五指间夹着半块温润的青玉。
    - |
      烈日炙烤着无尽沙海，连灵力都变得黏稠滞涩。
      就在你准备寻找阴凉之处歇息时，脚下的沙地忽然塌陷——
      露出一具半埋的白骨，手中紧攥着什么东西，至死未松。
    - |
      一场沙暴刚刚平息，天地间弥漫着呛人的尘土。
      风停之处，沙丘的形状全然改变。
      一具不知埋了多少岁月的枯骨，就这样毫无遮掩地暴露在日光之下。
  main_body:
    练气期: |
      以{{ player_name }}此时的修为，只能隐约感应到青玉中封存着一丝
      微弱的灵魂波动。那波动如风中残烛，随时可能熄灭。

      玉佩表面铭刻着一个模糊的「陆」字，另外半块似乎在很远的地方，
      发出同频的共鸣。但以{{ pronoun }}现在的灵识范围，根本无法定位。
    筑基期: |
      {{ player_name }}凝神感应，那玉佩中竟封存着一缕残魂的气息——
      微弱，但执念极深。以{{ pronoun }}筑基期的灵识来判断，
      这残魂的主人生前至少是金丹修士。

      玉佩表面铭刻着一个「陆」字，另外半块正在某个方向发出共鸣。
      {{ pronoun }}甚至能隐约感应到……是东南方，极远之处。
    金丹期: |
      金丹修士的灵识何等敏锐。{{ player_name }}仅一扫便看穿了全貌：
      这枯骨的主人是一位金丹中期修士，死于三种以上的致命伤，
      且死前正在以某种禁术将毕生修为封入这半块玉佩。

      那个「陆」字下方，还有一行以神识才能看到的微小字迹——
      「吾妻，等我。」
  choices:
    take:
      action: |
        {{ player_name }}伸手探向那半块青玉。
        指尖触碰的瞬间，一股冰冷的灵力顺着掌心直冲经脉——
        那是残魂最后的本能反抗，还是某种试探？
      success: |
        冰冷灵力如潮水般退去。青玉佩乖顺地落入你的掌心，
        温润的触感中似乎带着一丝不甘。

        你将它收入储物袋，隐约觉得……冥冥之中，
        有一条看不见的线，将你与某个遥远的存在牵连在了一起。

        💎 获得物品：【半块青玉佩】
      failure: |
        指尖触碰玉佩的刹那，一道凌厉的神识如同毒蛇般侵入你的识海！
        「不……许……碰！」一个嘶哑的声音在脑海中炸开。

        {{ player_name }}闷哼一声，踉跄后退数步，鼻间渗出一丝鲜血。
        那残魂虽已虚弱至极，临死前的反击依然不容小觑。

        ⚠️ 受到反噬，气血有损
    bury:
      action: |
        {{ player_name }}沉默片刻，单膝跪地。
        {{ pronoun }}没有去碰那块玉佩，而是默默运转灵力，
        在枯骨周围堆起一座小小的沙冢。

        「前辈，不知你生前有何执念。但此身既已归尘，便安息吧。」
      success: |
        沙冢堆成的一瞬，一件不可思议的事情发生了——
        那枯骨手中的青玉忽然绽放出柔和的光芒，
        一缕几乎看不见的残魂自骨中升起。

        它朝{{ player_name }}微微颔首，无声地说了句什么，
        而后化作点点萤光，消散在天地之间。

        你的心底涌起一股难以言喻的宁静。

        ✨ 善因种下，功德+10
      failure: ""
    probe:
      action: |
        {{ player_name }}盘膝坐于枯骨前，闭目凝神。
        一缕精纯的灵识如细丝般探入玉佩之中——
        这是极其危险的行为，相当于主动进入一个未知修士的精神领域。
      success: |
        灵识深入玉佩的瞬间，整个世界都变了。

        你看到了一个穿着青袍的中年男子，他站在一座燃烧的城池前，
        怀中抱着另外半块玉佩，眼中是绝望到极致的平静。

        「陆衍清……」一个名字浮现在你的意识中。
        你甚至看到了他最后的记忆：他把妻子送走，自己留下断后。
        那场战斗的对手，是一个浑身笼罩在血雾中的身影……

        🔍 获得关键线索：「陆衍清」与「血雾邪修」
      failure: |
        灵识刚触及残魂的记忆核心，一道远超你承受能力的信息洪流
        猛然灌入识海！

        无数画面如碎片般炸裂——火焰、哭喊、剑光、鲜血——
        {{ player_name }}发出一声痛呼，七窍渗出血丝，灵识被强行弹出。

        ⚠️ 神识受创，灵识类技能暂时封印
    leave:
      action: |
        {{ player_name }}深深看了那枯骨一眼，最终还是转身离去。
        修仙界中，不知来历的东西少碰为妙。

        身后，黄沙再次覆盖了那具枯骨。
        仿佛一切都没有发生过。

        ……真的没有发生过吗？
      success: ""
      failure: ""
  butterfly_echoes:
    枯骨安葬:
      - "恍惚间，你感到一股若有若无的善意在护佑着你。是那位枯骨前辈的回馈吗？"
      - "风中似乎传来一声叹息，那么遥远，又那么亲切。你想起了荒漠中安葬的那具枯骨。"
    枯骨玉佩:
      - "储物袋中的半块青玉佩忽然微微发烫，似乎在与什么产生共鸣……"
      - "你无意间触碰到那半块玉佩，一个模糊的画面闪过脑海——青袍，火焰，和一双绝望的眼睛。"
    残魂记忆:
      - "「陆衍清」这个名字再次浮现在脑海中。那段被强行灌入的记忆，似乎还有未曾解读的部分……"

# ---- spirit_spring: 灵泉 (uncommon, mountain, realm 1-5) ----
spirit_spring:
  atmosphere:
    - |
      山腹深处，一汪碧绿的泉水在幽暗中散发着柔和的荧光。
      空气中弥漫着沁人心脾的灵气，每一次呼吸都令经脉微微舒张。
    - |
      你循着灵气的气息一路深入，终于在一处石壁缝隙后发现了它——
      一汪不过丈许的小泉，泉水清澈见底，底部有几块发光的灵石。
    - |
      意外踏入了一处天然灵泉，泉水几乎没有温度，
      却有一种说不清的暖意从掌心渗入，直抵丹田。
  main_body:
    练气期: |
      以{{ player_name }}练气期的修为，只能感应到泉水中蕴含着丰沛的灵力，
      具体是何品质的灵泉，尚且无法判断。
      但光是站在泉边，就已经感到灵力运转顺畅了不少。
    筑基期: |
      {{ player_name }}凝神感应，这是一处天然形成的中品灵泉，
      非常罕见。泉水中灵力浓度是普通灵地的数倍，
      且有轻微的净化效果，能洗涤经脉中的杂质。
    金丹期: |
      以金丹境的感知一扫，{{ player_name }}对这处灵泉的底细一清二楚——
      上品灵泉，泉眼直连地下灵脉，水中含有微量的天地精华，
      若是长期修炼，效果不可估量。问题是……这处灵泉怎么会没有主人？
  choices:
    drink:
      action: "你掬起一捧泉水，一饮而尽，感受着灵力涌入经脉的舒畅感。"
      success: |
        甘冽的灵泉入喉，一股暖流迅速弥散至全身，
        经脉中的些许淤堵竟被冲刷干净，灵力运转比之前顺畅了数分。
        你盘膝坐于泉边，借助灵气大涨的优势，深入修炼了一段时间。
      failure: "泉水入喉，却有些异样——似乎有什么东西在泉水中，让你头晕目眩。"
    cultivate:
      action: "不急着饮用，先在泉边盘膝修炼，感受天然灵气的熏陶。"
      success: |
        泉边的灵气密度远超外界，修炼效率提升了三倍不止。
        你在此修炼了一个时辰，修为有了明显的精进。
      failure: "泉边灵气过于充沛，你的经脉一时无法适应，出现了轻微的胀痛。"
    take_water:
      action: "取出储物袋中的玉瓶，将部分灵泉装入，带走备用。"
      success: "玉瓶中装满了灵泉，这份收获日后必定大有用处。"
      failure: "灵泉离开泉眼便快速失去了大半灵力，玉瓶中的泉水变得普通。"
    guard:
      action: "这处灵泉价值不菲，你打算在附近布置简易结界，留作己用。"
      success: "结界布置成功，这处灵泉暂时成了你的私人修炼场所。"
      failure: "灵泉附近的地脉排斥你的结界印记，强行布置导致阵法崩溃。"
  butterfly_echoes:
    灵泉记忆:
      - "路过一处涓涓细流，你忽然想起了那处灵泉，那里的灵气……和现在这里的气息有些相似。"

# ---- time_rift: 时空裂隙 (epic, any, realm 3-10) ----
time_rift:
  atmosphere:
    - |
      空气中出现了一种说不清的扭曲感，就像将一面平整的水面用手指轻轻一点，
      涟漪从那个焦点向四面八方蔓延。
    - |
      「滋——」一声低鸣，空间在你眼前平静地裂开了一道缝，
      缝隙中透出的光芒不属于任何你见过的颜色。
    - |
      你踏入这处废墟的瞬间，时间仿佛停止了流动。
      周围的一切定格成一幅画，只有那道银色的裂缝在缓缓呼吸。
  main_body:
    练气期: |
      以{{ player_name }}目前的修为，根本无法判断这道裂缝意味着什么。
      但本能告诉你，这是危险的——也可能是千载难逢的机遇。
    筑基期: |
      {{ player_name }}凝神感应，这是一处时空裂隙，
      裂隙另一端通向何处，连筑基境的神识也无法探知。
      进入，可能遭遇任何情况；不进入，这道裂隙随时可能自然关闭。
    金丹期: |
      以金丹期的神识感知，{{ player_name }}隐约察觉到裂隙另一端的气息——
      那是一处极度浓郁的灵气所在，同时也夹杂着极为危险的法则压制。
      进去的人，未必能原样出来。
  choices:
    enter:
      action: |
        机缘难得，{{ player_name }}深吸一口气，毅然踏入裂隙。
        那道银光将你完全吞没……
      success: |
        裂隙另一端是一片上古遗迹，时间在这里流速不同——
        外界一日，此处或许已过三年。
        你在这里发现了无数珍贵的上古遗留，修炼感悟之深，难以言表。
        当你再次踏回裂隙，时间恰好过去了你能承受的最大限度。
      failure: |
        裂隙内的法则压制远超预想，你的灵力运转失控，
        被强行弹出，摔落在裂隙外，浑身上下灵力大乱，需要时间恢复。
    observe:
      action: "不急于进入，先在外围观察这道裂隙的规律。"
      success: |
        你花了半日时间观察，发现裂隙有规律地开合，
        并找到了进入的最佳时机——法则波动最弱的瞬间。
        做好准备，成功率大大提升。
      failure: "裂隙在你观察过程中突然加速收缩，来不及反应，机缘就此错过。"
    mark_and_leave:
      action: "先标记此处位置，回去做好准备再来。"
      success: "你留下了方位标记，这道裂隙若是周期性出现，下次一定要有备而来。"
      failure: "当你回头再找这处位置时，裂隙已经消失，地面上什么痕迹都没有留下。"
  butterfly_echoes:
    时空裂隙:
      - "你偶尔会想起那道银色的裂缝，想象裂缝另一端的世界，究竟是什么样的？"
    灵泉记忆:
      - "那处灵泉和时空裂隙，都出现在同一片区域——这里似乎有什么特殊之处。"
