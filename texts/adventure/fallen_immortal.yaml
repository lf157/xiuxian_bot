# 仙人遗府文案
# template_key: adventure/fallen_immortal::<event_key>

# ---- immortal_manor: 仙人遗府入口 (epic, mountain/ruin, realm 5-15) ----
immortal_manor:
  atmosphere:
    - |
      山壁上的一处普通岩缝，在月光下忽然显现出道道金色符文，
      那是封印之法，已经维持了不知多少个纪元，如今正在悄然松动。
    - |
      你感应到一处极为浓郁的仙灵气息，不像是天然形成的——
      循着气息深入，一座若隐若现的楼阁出现在云雾之间。
      那是仙人故居的残影，在特定时刻才会显现于世。
    - |
      脚下的地面上出现了一枚古印，扫过你指尖的灵力，随即沉入地底。
      片刻后，大地缓缓开裂，露出一条向下延伸的石阶。
  main_body:
    金丹期: |
      仙人遗府——这四个字代表的，是无数修士梦寐以求的传承与机缘。
      以{{ player_name }}现在金丹境的修为，进入后的法则压制会相当明显，
      但能入内本身，就已经是莫大的缘法。
    元婴期: |
      {{ player_name }}踏入遗府前稳了稳心神。
      元婴境进入仙人遗府，压制感勉强可以承受，
      但遗府内可能存在的守护机关甚至残留意志，将是最大的危险。
    化神期: |
      以化神境踏入仙人遗府，对{{ player_name }}而言，
      压制已不成问题，真正的价值在于其中封存的道法传承——
      一位飞升者留下的道意，能让化神修士的修炼少走数百年弯路。
  choices:
    enter_carefully:
      action: "谨慎入内，每走一步都以神识探查，宁慢勿快。"
      success: |
        稳扎稳打没有出错，你安全绕过了三处守护机关，
        深入到了遗府的核心修炼室，找到了一枚玉简——
        其中封存着飞升者亲手记录的修炼心得，价值难以估量。
        📜 获得：【仙人道意玉简】
      failure: "谨慎有余而魄力不足，在一个关键通道前犹豫太久，触发了警示机关。"
    rush_to_core:
      action: "直奔最核心的区域，不理会沿途的遗留，只取最好的。"
      success: |
        以速度突破机关来不及反应的窗口，你直抵最深处，
        在祭坛上取下了一件尚有余温的仙器碎片。
        ⚡ 获得：【残缺仙器碎片】（未知效果，待鉴定）
      failure: "核心区域有自动防御阵，硬闯的代价是被全力反击，你被打得重伤。"
    study_formations:
      action: "不急着取宝，先研究遗府内的阵法构造，那才是最珍贵的东西。"
      success: |
        你花了大量时间研究遗府内的阵法体系，记录下了数十个精妙的阵法节点，
        这些收获比任何器物都更持久。
        ✨ 阵法理解大幅提升，获得隐藏阵法图谱
      failure: "研究阵法时专注过度，忘记了时间，遗府的开放时间将尽，只能仓皇撤退。"
  victory:
    - "踏出遗府时，身后那道光门缓缓关闭，下次开启不知是何年何月。你回望片刻，转身而去。"
    - "这次遗府之行的收获，需要很长时间才能慢慢消化——这是最好的机缘，也是最重的责任。"
  defeat:
    - "遗府内的守护机关超出了你的应对能力，你被强行驱逐，落在遗府外，遍体鳞伤。"
  butterfly_echoes:
    仙府缘起:
      - "手中那枚玉简微微震动，似乎与什么产生了感应——是另一处仙人遗留在呼应吗？"

# ---- immortal_ghost: 仙人执念残灵 (legendary, any, realm 8-20) ----
immortal_ghost:
  atmosphere:
    - |
      那道身影出现得极为突然，就像一直站在那里，只是你之前没有注意到。
      白衣，发丝飘飞，面容模糊——这是一道残灵，但其中蕴含的道意，
      依然强横得令人窒息。
    - |
      「你……有几分资质。」
      声音从无处传来，却在识海中轰鸣。
      你循声回望，空无一人，但那股气息，无处不在。
  main_body:
    通用: |
      这是一位飞升者残留于世间的执念化形，
      他未能带走的，是对某件事、某个人、或某段因缘的放不下。
      {{ player_name }}出现在这里，或许是缘法，或许是巧合。
      但此刻，那道残灵正在打量着你。
  choices:
    listen:
      action: "你没有开口，静静等待，让残灵先说。"
      success: |
        残灵沉默了很长时间，然后开口，讲述了一段久远的往事。
        他留在这里，是因为一个未了的心愿。而你，可能是唯一能帮他完成的人。
        这一刻，你们之间有了某种命运的牵连。
        📌 开启支线：【仙人遗愿】
      failure: ""
    ask_for_guidance:
      action: "你行礼问道：前辈，晚辈有修炼上的疑惑，敢请指点。"
      success: |
        残灵打量了你片刻，点了点头。
        他没有系统地传授，只是随口提点了几句，但那几句话字字珠玑，
        让你对修炼某处卡壳之处豁然开朗。
        ✨ 顿悟：修炼感悟大涨
      failure: "残灵沉默，没有回应。也许他的执念与传道无关，此时不是时机。"
    leave:
      action: "道不同，不相为谋。你行礼后转身离去。"
      success: "残灵没有阻拦。临走前，你感到背后有一道目光，不知是赞许还是叹息。"
      failure: ""
  butterfly_echoes:
    仙人遗愿:
      - "那道残灵说的那件事，你一直记在心里。也许哪天，能找到那个答案。"
